services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: printtracker
      POSTGRES_USER: printtracker
      POSTGRES_PASSWORD: printtracker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U printtracker -d printtracker"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: postgresql+psycopg://printtracker:printtracker@db:5432/printtracker
      PORT: 5000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/staff/login', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - app-instance:/app/instance
      - app-labels:/app/labels
    command: ["gunicorn", "-b", "0.0.0.0:5000", "run:app"]

volumes:
  postgres-data:
  app-instance:
  app-labels: